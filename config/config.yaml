# 量化Smart Beta组合配置文件

# ============================================
# 模拟数据参数
# ============================================
simulation:
  # 股票数量
  n_stocks: 500
  
  # 交易天数
  n_days: 252
  
  # 因子数量
  n_factors: 5
  
  # 因子名称
  factor_names:
    - value      # 价值
    - momentum   # 动量
    - quality    # 质量
    - size       # 规模
    - low_vol    # 低波动
  
  # 因子参数 (均值和标准差)
  factor_params:
    mean: 0.0002    # 日均因子收益
    std: 0.01       # 因子收益波动
    
  # 特异收益率参数
  idio_params:
    mean: 0.0
    std: 0.02
    
  # 因子暴露参数
  exposure_params:
    # 因子暴露的范围
    min_exposure: 0.0
    max_exposure: 1.0
    
# ============================================
# Smart Beta构建参数
# ============================================
smartbeta:
  # 每个因子选取的股票数量
  top_n: 20
  
  # 是否等权
  equal_weight: true
  
# ============================================
# 组合优化方法参数
# ============================================
portfolio:
  # 无风险利率
  risk_free_rate: 0.02
  
  # 交易日天数 (年化用)
  trading_days: 240
  
# ============================================
# 回测参数
# ============================================
backtest:
  # 回测开始日期 (如果是模拟数据则忽略)
  start_date: "2019-01-01"
  
  # 回测结束日期
  end_date: "2026-01-23"
  
  # 再平衡频率 (天)
  rebalance_freq: 20
